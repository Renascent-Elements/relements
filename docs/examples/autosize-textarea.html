<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · Autosize textarea</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 36rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
    </style>
  </head>
  <body data-page="autosize-textarea">
    <header>
      <h1>Autosize textarea</h1>
      <p>A textarea that grows with its content.</p>
    </header>

    <section aria-labelledby="basic-heading" data-testid="basic">
      <h2 id="basic-heading">Basic</h2>
      <!-- demo:start name="basic" -->
      <label class="re-field">
        <span class="re-field__label">Bio</span>
        <textarea
          class="re-textarea"
          data-autosize
          id="ta-autosize"
          rows="2"
          placeholder="Grows as you type…"
        ></textarea>
      </label>
      <!-- demo:end -->
    </section>

    <section aria-labelledby="prefilled-heading" data-testid="prefilled">
      <h2 id="prefilled-heading">Prefilled</h2>
      <label class="re-field">
        <span class="re-field__label">Notes</span>
        <textarea class="re-textarea" data-autosize id="ta-prefilled" rows="2">
Line one of the server-rendered value.
Line two.
Line three sizes the box on load.</textarea
        >
      </label>
    </section>

    <section aria-labelledby="capped-heading" data-testid="capped">
      <h2 id="capped-heading">Capped</h2>
      <label class="re-field">
        <span class="re-field__label">Message</span>
        <textarea
          class="re-textarea"
          data-autosize
          id="ta-capped"
          rows="2"
          style="--re-autosize-max-block-size: 6rem"
          placeholder="Grows to a max, then scrolls…"
        ></textarea>
      </label>
    </section>

    <script type="module">
      import { enhanceAutosize } from "/packages/core/src/behaviors/autosize.js";
      window.__reController = enhanceAutosize(document);
    </script>
  </body>
</html>
