<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · &lt;re-toast&gt;</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 48rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
      .row {
        display: flex;
        gap: var(--re-space-3);
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body data-page="re-toast">
    <header>
      <h1>&lt;re-toast&gt;</h1>
      <p>Custom-element wrapper for the toast region.</p>
    </header>

    <section aria-labelledby="basic-heading" data-testid="basic">
      <h2 id="basic-heading">Trigger toasts</h2>
      <!-- demo:start name="basic" -->
      <div class="row">
        <button
          type="button"
          class="re-button"
          id="rt-default"
          data-demo-toast="Saved."
          data-demo-toast-target="toaster"
        >
          Default
        </button>
        <button
          type="button"
          class="re-button"
          data-variant="secondary"
          id="rt-success"
          data-demo-toast="Upload complete."
          data-demo-toast-tone="success"
          data-demo-toast-target="toaster"
        >
          Success
        </button>
        <button
          type="button"
          class="re-button"
          data-variant="danger"
          id="rt-danger"
          data-demo-toast="Network error."
          data-demo-toast-tone="danger"
          data-demo-toast-target="toaster"
        >
          Danger
        </button>
      </div>
      <re-toast id="toaster"></re-toast>
      <!-- demo:end -->
    </section>

    <script type="module">
      import "/packages/core/src/elements/re-toast.js";
      const toaster = document.getElementById("toaster");
      document
        .getElementById("rt-default")
        .addEventListener("click", () => toaster.show("Saved.", { duration: 0 }));
      document
        .getElementById("rt-success")
        .addEventListener("click", () =>
          toaster.show("Upload complete.", { tone: "success", duration: 0 }),
        );
      document
        .getElementById("rt-danger")
        .addEventListener("click", () =>
          toaster.show("Network error.", { tone: "danger", duration: 0 }),
        );
    </script>

    <article hidden>
      <h2>Notes</h2>
      <ul>
        <li>
          <code>.show(message, options)</code> returns the same controller as
          <code>showToast()</code>.
        </li>
        <li>
          The element is light-DOM and inherits all page CSS; toasts use the standard toast.css
          styles.
        </li>
      </ul>
    </article>
  </body>
</html>
