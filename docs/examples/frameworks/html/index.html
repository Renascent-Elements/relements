<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · HTML framework example</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 48rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
      .re-tabpanel {
        padding: var(--re-space-4);
        background-color: var(--re-color-bg-subtle);
        border-radius: var(--re-radius-md);
      }
    </style>
  </head>
  <body data-page="frameworks-html">
    <h1>Plain HTML</h1>

    <p><button class="re-button" type="button">Save</button></p>

    <!-- Lifecycle demo: mount/unmount the enhanced subtree to exercise destroy(). -->
    <p><button id="toggle" type="button">Toggle demo</button></p>

    <div id="demo"></div>

    <script type="module">
      import { enhanceTabs } from "/packages/core/src/behaviors/tabs.js";
      import { enhanceMultiSelect } from "/packages/core/src/behaviors/multiselect.js";
      import "/packages/core/src/elements/re-tabs.js";

      const demo = document.getElementById("demo");
      const markup = `
        <section aria-labelledby="enh-h">
          <h2 id="enh-h">enhanceTabs</h2>
          <div class="re-tabs" data-re-tabs id="enhanced">
            <div class="re-tabs__list" role="tablist" aria-label="Enhanced">
              <button class="re-tab" role="tab" id="e-tab-1" aria-controls="e-panel-1" aria-selected="true">One</button>
              <button class="re-tab" role="tab" id="e-tab-2" aria-controls="e-panel-2" aria-selected="false" tabindex="-1">Two</button>
              <button class="re-tab" role="tab" id="e-tab-3" aria-controls="e-panel-3" aria-selected="false" tabindex="-1">Three</button>
            </div>
            <section class="re-tabpanel" role="tabpanel" id="e-panel-1" aria-labelledby="e-tab-1" tabindex="0">Panel one</section>
            <section class="re-tabpanel" role="tabpanel" id="e-panel-2" aria-labelledby="e-tab-2" tabindex="0" hidden>Panel two</section>
            <section class="re-tabpanel" role="tabpanel" id="e-panel-3" aria-labelledby="e-tab-3" tabindex="0" hidden>Panel three</section>
          </div>
        </section>

        <section aria-labelledby="ce-h">
          <h2 id="ce-h">&lt;re-tabs&gt; custom element</h2>
          <re-tabs id="ce" aria-label="Custom element">
            <div class="re-tabs__list" role="tablist" aria-label="Custom element">
              <button class="re-tab" role="tab" id="c-tab-1" aria-controls="c-panel-1" aria-selected="true">Alpha</button>
              <button class="re-tab" role="tab" id="c-tab-2" aria-controls="c-panel-2" aria-selected="false" tabindex="-1">Beta</button>
              <button class="re-tab" role="tab" id="c-tab-3" aria-controls="c-panel-3" aria-selected="false" tabindex="-1">Gamma</button>
            </div>
            <section class="re-tabpanel" role="tabpanel" id="c-panel-1" aria-labelledby="c-tab-1" tabindex="0">Alpha panel</section>
            <section class="re-tabpanel" role="tabpanel" id="c-panel-2" aria-labelledby="c-tab-2" tabindex="0" hidden>Beta panel</section>
            <section class="re-tabpanel" role="tabpanel" id="c-panel-3" aria-labelledby="c-tab-3" tabindex="0" hidden>Gamma panel</section>
          </re-tabs>
          <p>Last tab: <output id="last-tab">none</output></p>
        </section>

        <section aria-labelledby="ms-h">
          <h2 id="ms-h">enhanceMultiSelect</h2>
          <!-- Above the field: the open (absolutely-positioned) panel must not
               cover this control. -->
          <p><button id="ms-rerender" type="button">Re-render</button> <output id="ms-renders">0</output> renders</p>
          <div class="re-field">
            <span class="re-field__label" id="ms-label">Frameworks</span>
            <!-- enhanceMultiSelect injects a live-region SIBLING via host.after(),
                 so wrap the <details> ALONE: the injected node then lands inside
                 #ms-wrap, which a framework treats as opaque (no vdom-sibling
                 conflict). Enhance the wrapper, not the <details>. -->
            <div id="ms-wrap">
              <details class="re-multiselect" id="ms" data-re-multiselect>
                <summary class="re-multiselect__summary" aria-labelledby="ms-label ms-value">
                  <span class="re-multiselect__value" id="ms-value" data-placeholder>Select frameworks</span>
                </summary>
                <fieldset class="re-multiselect__panel">
                  <legend class="re-sr-only">Frameworks</legend>
                  <label class="re-multiselect__option"><input type="checkbox" class="re-checkbox" name="fw" value="react" /> React</label>
                  <label class="re-multiselect__option"><input type="checkbox" class="re-checkbox" name="fw" value="vue" /> Vue</label>
                  <label class="re-multiselect__option"><input type="checkbox" class="re-checkbox" name="fw" value="svelte" /> Svelte</label>
                </fieldset>
              </details>
            </div>
          </div>
        </section>
      `;

      let tabs = null;
      let multiselect = null;

      function mount() {
        demo.innerHTML = markup;
        // Scope enhanceTabs to #enhanced so it does not double-enhance <re-tabs>
        // (which enhances itself in connectedCallback).
        tabs = enhanceTabs(demo.querySelector("#enhanced"));
        // Enhance the WRAPPER, not the <details>: the behavior's injected live
        // region then lands inside #ms-wrap, matching the framework apps where it
        // must survive reconciliation.
        multiselect = enhanceMultiSelect(demo.querySelector("#ms-wrap"));
        demo.querySelector("#ce").addEventListener("re-change", (event) => {
          demo.querySelector("#last-tab").textContent = event.detail.tabId;
        });
        // Plain HTML has no reconciler, so this is just a no-op baseline for the
        // shared contract's "survives a re-render" step.
        let renders = 0;
        demo.querySelector("#ms-rerender").addEventListener("click", () => {
          demo.querySelector("#ms-renders").textContent = String(++renders);
        });
      }

      function unmount() {
        // Tear down both enhancers, then remove the subtree (listeners + the
        // <re-tabs> element, whose disconnectedCallback also runs, go with it).
        tabs?.destroy();
        multiselect?.destroy();
        tabs = multiselect = null;
        demo.innerHTML = "";
      }

      document.getElementById("toggle").addEventListener("click", () => {
        if (tabs) unmount();
        else mount();
      });

      mount();
    </script>
  </body>
</html>
