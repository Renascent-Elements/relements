<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · Password toggle</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 36rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
    </style>
  </head>
  <body data-page="password-toggle">
    <header>
      <h1>Password toggle</h1>
      <p>A show/hide button over a native password field.</p>
    </header>

    <section aria-labelledby="basic-heading" data-testid="basic">
      <h2 id="basic-heading">Basic</h2>
      <!-- demo:start name="basic" -->
      <label class="re-field">
        <span class="re-field__label">Password</span>
        <span class="re-input-group">
          <input
            class="re-input"
            type="password"
            id="pw"
            value="hunter2"
            autocomplete="current-password"
          />
          <button
            class="re-input-group__action"
            type="button"
            data-re-password-toggle
            aria-controls="pw"
            aria-label="Show password"
            hidden
          >
            <svg
              data-when="hidden"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              aria-hidden="true"
            >
              <path d="M1.5 10S4.5 4 10 4s8.5 6 8.5 6-3 6-8.5 6-8.5-6-8.5-6Z" />
              <circle cx="10" cy="10" r="2.5" />
            </svg>
            <svg
              data-when="shown"
              hidden
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              aria-hidden="true"
            >
              <path d="M1.5 10S4.5 4 10 4s8.5 6 8.5 6-3 6-8.5 6-8.5-6-8.5-6Z" />
              <circle cx="10" cy="10" r="2.5" />
              <path d="m3 3 14 14" />
            </svg>
          </button>
        </span>
      </label>
      <!-- demo:end -->
    </section>

    <section aria-labelledby="disabled-heading" data-testid="disabled">
      <h2 id="disabled-heading">Disabled</h2>
      <label class="re-field">
        <span class="re-field__label">Password</span>
        <span class="re-input-group">
          <input class="re-input" type="password" id="pw-disabled" value="hunter2" disabled />
          <button
            class="re-input-group__action"
            type="button"
            data-re-password-toggle
            aria-controls="pw-disabled"
            aria-label="Show password"
            hidden
          >
            <svg
              data-when="hidden"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              aria-hidden="true"
            >
              <path d="M1.5 10S4.5 4 10 4s8.5 6 8.5 6-3 6-8.5 6-8.5-6-8.5-6Z" />
              <circle cx="10" cy="10" r="2.5" />
            </svg>
            <svg
              data-when="shown"
              hidden
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              aria-hidden="true"
            >
              <path d="M1.5 10S4.5 4 10 4s8.5 6 8.5 6-3 6-8.5 6-8.5-6-8.5-6Z" />
              <circle cx="10" cy="10" r="2.5" />
              <path d="m3 3 14 14" />
            </svg>
          </button>
        </span>
      </label>
    </section>

    <script type="module">
      import { enhancePasswordToggle } from "/packages/core/src/behaviors/password-toggle.js";
      window.__reController = enhancePasswordToggle(document);
    </script>
  </body>
</html>
