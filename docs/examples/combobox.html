<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · Combobox</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 48rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
    </style>
  </head>
  <body data-page="combobox">
    <header>
      <h1>Combobox</h1>
      <p>Native suggestion input built on <code>&lt;datalist&gt;</code>.</p>
    </header>

    <section aria-labelledby="basic-heading" data-testid="basic">
      <h2 id="basic-heading">Basic</h2>
      <!-- demo:start name="basic" -->
      <label class="re-field">
        <span class="re-field__label">Favorite fruit</span>
        <input
          type="text"
          class="re-input re-combobox"
          list="fruit-options"
          placeholder="Start typing…"
        />
      </label>
      <datalist id="fruit-options">
        <option value="Apple"></option>
        <option value="Banana"></option>
        <option value="Cherry"></option>
        <option value="Mango"></option>
        <option value="Peach"></option>
        <option value="Pear"></option>
      </datalist>
      <!-- demo:end -->
    </section>

    <section aria-labelledby="sizes-heading" data-testid="sizes">
      <h2 id="sizes-heading">Sizes</h2>
      <!-- demo:start name="sizes" -->
      <label class="re-field">
        <span class="re-field__label">Small</span>
        <input type="text" class="re-input re-combobox" data-size="sm" list="city-options" />
      </label>
      <label class="re-field">
        <span class="re-field__label">Large</span>
        <input type="text" class="re-input re-combobox" data-size="lg" list="city-options" />
      </label>
      <datalist id="city-options">
        <option value="Budapest"></option>
        <option value="Berlin"></option>
        <option value="Lisbon"></option>
      </datalist>
      <!-- demo:end -->
    </section>

    <!-- min-block-size keeps the open suggestion list inside the section's
         box so the visual snapshot captures it. -->
    <section
      aria-labelledby="enhanced-heading"
      data-testid="enhanced"
      style="min-block-size: 26rem"
    >
      <h2 id="enhanced-heading">Enhanced</h2>
      <!-- demo:start name="enhanced" -->
      <label class="re-field">
        <span class="re-field__label">Time zone</span>
        <input
          type="text"
          class="re-input re-combobox"
          list="zone-options"
          data-re-combobox
          placeholder="Type to filter…"
        />
      </label>
      <datalist id="zone-options">
        <option value="Europe/Budapest"></option>
        <option value="Europe/Berlin"></option>
        <option value="Europe/Lisbon"></option>
        <option value="America/Argentina/Buenos_Aires"></option>
        <option value="America/New_York"></option>
        <option value="Asia/Tokyo"></option>
        <option value="Australia/Lord_Howe"></option>
      </datalist>
      <!-- demo:end -->
    </section>

    <script type="module">
      import { enhanceCombobox } from "/packages/core/src/behaviors/combobox.js";
      enhanceCombobox(document);
    </script>
  </body>
</html>
