<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · Date &amp; time</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 48rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
      .stack {
        display: grid;
        gap: var(--re-space-4);
        max-width: 22rem;
      }
    </style>
  </head>
  <body data-page="datetime">
    <header>
      <h1>Date &amp; time</h1>
      <p>Native temporal inputs styled with <code>.re-input</code> — no JavaScript.</p>
    </header>

    <section aria-labelledby="basic-heading" data-testid="basic">
      <h2 id="basic-heading">Types</h2>
      <!-- demo:start name="basic" -->
      <div class="stack">
        <label class="re-field">
          <span class="re-field__label">Date</span>
          <input class="re-input" type="date" name="date" value="2026-06-20" />
        </label>
        <label class="re-field">
          <span class="re-field__label">Time</span>
          <input class="re-input" type="time" name="time" value="09:30" />
        </label>
        <label class="re-field">
          <span class="re-field__label">Date &amp; time</span>
          <input class="re-input" type="datetime-local" name="datetime" value="2026-06-20T09:30" />
        </label>
        <label class="re-field">
          <span class="re-field__label">Month</span>
          <input class="re-input" type="month" name="month" value="2026-06" />
        </label>
        <label class="re-field">
          <span class="re-field__label">Week</span>
          <input class="re-input" type="week" name="week" value="2026-W25" />
        </label>
      </div>
      <!-- demo:end -->
    </section>

    <section aria-labelledby="constraints-heading" data-testid="constraints">
      <h2 id="constraints-heading">Constraints</h2>
      <!-- demo:start name="constraints" -->
      <div class="stack">
        <label class="re-field">
          <span class="re-field__label">Appointment date</span>
          <input
            class="re-input"
            type="date"
            name="appointment"
            min="2026-06-01"
            max="2026-06-30"
            value="2026-06-20"
            aria-describedby="appointment-hint"
          />
          <span class="re-field__hint" id="appointment-hint">
            Choose a date in June 2026. An out-of-range date turns the field red — the allowed range
            is named here so the reason reaches assistive tech.
          </span>
        </label>
      </div>
      <!-- demo:end -->
    </section>
  </body>
</html>
