<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · Skeleton</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 48rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--re-space-3);
      }
    </style>
  </head>
  <body data-page="skeleton">
    <header>
      <h1>Skeleton</h1>
      <p>
        Decorative loading placeholder. Mark instances <code>aria-hidden="true"</code> and set
        <code>aria-busy</code> on the region.
      </p>
    </header>

    <section aria-labelledby="card-heading" data-testid="card">
      <h2 id="card-heading">Loading card</h2>
      <!-- demo:start name="card" -->
      <div
        role="status"
        aria-busy="true"
        aria-label="Loading"
        style="display: flex; gap: var(--re-space-3); align-items: center; max-width: 22rem"
      >
        <div
          class="re-skeleton"
          data-shape="circle"
          aria-hidden="true"
          style="width: 3rem; height: 3rem; flex: none"
        ></div>
        <div style="flex: 1; display: grid; gap: var(--re-space-2)">
          <div class="re-skeleton" data-shape="text" aria-hidden="true" style="width: 70%"></div>
          <div class="re-skeleton" data-shape="text" aria-hidden="true" style="width: 40%"></div>
        </div>
      </div>
      <!-- demo:end -->
    </section>

    <section aria-labelledby="block-heading" data-testid="block">
      <h2 id="block-heading">Block</h2>
      <!-- demo:start name="block" -->
      <div class="re-skeleton" aria-hidden="true" style="max-width: 22rem; height: 8rem"></div>
      <!-- demo:end -->
    </section>
  </body>
</html>
