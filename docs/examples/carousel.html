<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · Carousel</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 48rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
      .frame {
        max-width: 32rem;
        margin-inline: auto;
      }
      .slide-art {
        aspect-ratio: 16 / 9;
        display: grid;
        place-items: center;
        border-radius: var(--re-radius-md);
        color: var(--re-color-text-on-accent);
        font-size: var(--re-size-text-3xl);
        font-weight: var(--re-font-weight-semibold);
      }
      .re-carousel__slide figcaption {
        margin-block-start: var(--re-space-2);
        color: var(--re-color-text-muted);
        font-size: var(--re-size-text-sm);
        text-align: center;
      }
    </style>
  </head>
  <body data-page="carousel">
    <header>
      <h1>Carousel</h1>
      <p>A native CSS scroll-snap strip; JavaScript only back-fills the controls.</p>
    </header>

    <section aria-labelledby="basic-heading" data-testid="basic">
      <h2 id="basic-heading">Basic</h2>
      <!-- demo:start name="basic" -->
      <div class="re-carousel frame" data-re-carousel>
        <div
          class="re-carousel__track"
          role="group"
          aria-roledescription="carousel"
          aria-label="Featured photos"
          tabindex="0"
        >
          <figure
            class="re-carousel__slide"
            aria-roledescription="slide"
            aria-label="Sunset over the bay"
          >
            <div class="slide-art" style="background-color: var(--re-color-accent-600)">1</div>
            <figcaption>Sunset over the bay</figcaption>
          </figure>
          <figure
            class="re-carousel__slide"
            aria-roledescription="slide"
            aria-label="Forest trail in autumn"
          >
            <div class="slide-art" style="background-color: var(--re-color-success-600)">2</div>
            <figcaption>Forest trail in autumn</figcaption>
          </figure>
          <figure
            class="re-carousel__slide"
            aria-roledescription="slide"
            aria-label="City skyline at dusk"
          >
            <div class="slide-art" style="background-color: var(--re-color-warning-600)">3</div>
            <figcaption>City skyline at dusk</figcaption>
          </figure>
          <figure
            class="re-carousel__slide"
            aria-roledescription="slide"
            aria-label="Desert dunes at noon"
          >
            <div class="slide-art" style="background-color: var(--re-color-danger-600)">4</div>
            <figcaption>Desert dunes at noon</figcaption>
          </figure>
        </div>
      </div>
      <!-- demo:end -->
    </section>

    <script type="module">
      import { enhanceCarousel } from "/packages/core/src/behaviors/carousel.js";
      enhanceCarousel();
    </script>
  </body>
</html>
