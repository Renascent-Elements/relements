<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relements · Avatar</title>
    <link rel="stylesheet" href="/packages/core/src/index.css" />
    <style>
      body {
        padding: var(--re-space-8);
        max-width: 48rem;
        margin-inline: auto;
      }
      section {
        margin-block: var(--re-space-6);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--re-space-3);
      }
    </style>
  </head>
  <body data-page="avatar">
    <header>
      <h1>Avatar</h1>
      <p>Circular user image, or a text-initials fallback.</p>
    </header>

    <section aria-labelledby="sizes-heading" data-testid="sizes">
      <h2 id="sizes-heading">Initials &amp; sizes</h2>
      <div class="row">
        <span class="re-avatar" data-size="sm" role="img" aria-label="Ada Lovelace">AL</span>
        <span class="re-avatar" role="img" aria-label="Grace Hopper">GH</span>
        <span class="re-avatar" data-size="lg" role="img" aria-label="Alan Turing">AT</span>
      </div>
    </section>

    <section aria-labelledby="image-heading" data-testid="image">
      <h2 id="image-heading">Image</h2>
      <span class="re-avatar" data-size="lg">
        <img
          alt="Sample avatar"
          src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='44'%20height='44'%3E%3Crect%20width='44'%20height='44'%20fill='%232563eb'/%3E%3Ccircle%20cx='22'%20cy='17'%20r='8'%20fill='white'/%3E%3Crect%20x='9'%20y='29'%20width='26'%20height='15'%20rx='7.5'%20fill='white'/%3E%3C/svg%3E"
        />
      </span>
    </section>
  </body>
</html>
